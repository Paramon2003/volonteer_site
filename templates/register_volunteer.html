{% extends "layout.html" %}
{% block title %}Регистрация волонтера{% endblock %}
{% block content %}
<style>
    .register-container {
        max-width: 600px;
        margin: 0 auto;
        padding: 20px;
    }

    .register-title {
        font-family: 'Gilroy', sans-serif;
        font-size: clamp(24px, 5vw, 36px);
        font-weight: 700;
        color: #000;
        margin-bottom: 30px;
        text-align: center;
    }

    .register-card {
        background: #FFF6F0;
        border-radius: 32px;
        padding: 30px;
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
    }

    .form-label {
        font-weight: 500;
        color: #333;
    }

    .form-control {
        border-radius: 16px;
        border: 1px solid #e0e0e0;
        padding: 12px 16px;
    }

    .form-control:focus {
        border-color: #FF6F61;
        box-shadow: 0 0 0 0.2rem rgba(255, 111, 97, 0.25);
    }

    .btn-register-submit {
        background: #FF6F61;
        color: white;
        border: none;
        padding: 12px 30px;
        border-radius: 46px;
        font-size: 18px;
        font-weight: 500;
        width: 100%;
        transition: all 0.3s;
    }

    .btn-register-submit:hover {
        background: #e85b4e;
        transform: scale(1.02);
    }

    .back-link {
        display: inline-block;
        margin-top: 20px;
        color: #FF6F61;
        text-decoration: none;
    }

    .back-link:hover {
        text-decoration: underline;
    }

    @media (max-width: 640px) {
        .register-card {
            padding: 20px;
        }

        .register-container {
            padding: 15px;
        }
    }
</style>

<div class="register-container">
    <div class="register-card">
        <h2 class="register-title">Регистрация волонтера</h2>

        <form method="POST" enctype="multipart/form-data">
            <div class="mb-3">
                <label class="form-label">Имя</label>
                <input type="text" name="name" class="form-control" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Email</label>
                <input type="email" name="email" class="form-control" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Телефон</label>
                <input type="tel" name="phone" class="form-control" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Пароль</label>
                <input type="password" name="password" class="form-control" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Подтверждение пароля</label>
                <input type="password" name="confirm_password" class="form-control" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Фото профиля (необязательно)</label>
                <input type="file" name="photo" class="form-control" accept="image/*">
            </div>

            <button type="submit" class="btn-register-submit">Зарегистрироваться</button>
        </form>

        <a href="{{ url_for('choose_role') }}" class="back-link">← Назад к выбору типа аккаунта</a>
    </div>
</div>
{% endblock %}
