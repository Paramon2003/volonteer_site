{% extends "layout.html" %}
{% block title %}Задания{% endblock %}
{% block content %}
<h2 class="mt-4">Список заданий</h2>
<div class="row">
    {% for task in tasks %}
        <div class="col-md-6 mb-3">
            <div class="card">
                <div class="card-body">
                    <h5 class="card-title">{{ task[1] }}</h5>
                    <p class="card-text">{{ task[2] }}</p>
                    <p class="text-muted">Нуждающийся: {{ task[3] }}</p>
                </div>
            </div>
        </div>
    {% endfor %}
</div>
{% endblock %}
