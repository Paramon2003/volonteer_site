{% extends "layout.html" %}
{% block title %}Регистрация{% endblock %}
{% block content %}
<h2 class="mt-4">Регистрация</h2>
<form method="POST" enctype="multipart/form-data">
    <div class="mb-3">
        <label class="form-label">Тип аккаунта</label>
        <select name="role" class="form-control" id="roleSelect" required onchange="toggleOrganizationFields()">
            <option value="volunteer">Волонтер</option>
            <option value="organization">Организация (НКО, фонд, приют)</option>
        </select>
    </div>

    <div class="mb-3">
        <label class="form-label">Имя / Название организации</label>
        <input type="text" name="name" class="form-control" required>
    </div>

    <div class="mb-3" id="organizationFields" style="display: none;">
        <label class="form-label">Описание организации</label>
        <textarea name="organization_description" class="form-control" rows="3"
                  placeholder="Расскажите о вашей организации, целях деятельности и опыте работы"></textarea>
    </div>

    <div class="mb-3">
        <label class="form-label">Email</label>
        <input type="email" name="email" class="form-control" required>
    </div>

    <div class="mb-3">
        <label class="form-label">Телефон</label>
        <input type="tel" name="phone" class="form-control" required>
    </div>

    <div class="mb-3">
        <label class="form-label">Город</label>
        <input type="text" name="city" class="form-control" value="Воронеж" required>
    </div>

    <div class="mb-3">
        <label class="form-label">Пароль</label>
        <input type="password" name="password" class="form-control" required>
    </div>

    <div class="mb-3">
        <label class="form-label">Подтверждение пароля</label>
        <input type="password" name="confirm_password" class="form-control" required>
    </div>

    <div class="mb-3">
        <label class="form-label">Фото профиля (необязательно)</label>
        <input type="file" name="photo" class="form-control">
    </div>

    <button type="submit" class="btn btn-primary">Зарегистрироваться</button>
</form>

<script>
function toggleOrganizationFields() {
    var role = document.getElementById('roleSelect').value;
    var orgFields = document.getElementById('organizationFields');
    orgFields.style.display = role === 'organization' ? 'block' : 'none';
}
</script>
{% endblock %}
