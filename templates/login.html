{% extends "layout.html" %}
{% block title %}Авторизация{% endblock %}
{% block content %}
<style>
    /* Страница авторизации */
    .login-page {
        min-height: calc(100vh - 80px);
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 40px 20px;
    }

    /* Контейнер формы */
    .login-container {
        width: 100%;
        max-width: 700px;
        margin: 0 auto;
        position: relative;
    }

    /* Заголовок (Rectangle 1) */
    .login-header {
        width: 100%;
        max-width: 686px;
        margin: 0 auto 60px;
        text-align: center;
    }
    .login-header img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

    .login-title {
        font-family: 'Gilroy', sans-serif;
        font-weight: 400;
        font-size: clamp(28px, 6vw, 48px);
        line-height: 1.2;
        color: #000000;
        padding: 40px 30px;
        background: #FF8E83;
        border-radius: 88px;
        margin: 0;
    }

    /* Форма */
    .login-form {
        width: 100%;
        max-width: 559px;
        margin: 0 auto;
    }

    /* Поле ввода */
    .input-group-custom {
        margin-bottom: 87px;
        position: relative;
    }

    .input-label {
        position: absolute;
        left: 43px;
        top: 50%;
        transform: translateY(-50%);
        font-family: 'Inter', sans-serif;
        font-weight: 400;
        font-size: clamp(20px, 5vw, 36px);
        line-height: 1.2;
        color: #B2B2B2;
        pointer-events: none;
        transition: all 0.3s ease;
        z-index: 1;
    }

    .input-field {
        width: 100%;
        height: 92px;
        background: #FFFFFF;
        border: 3px solid #FF6F61;
        border-radius: 46px;
        font-family: 'Inter', sans-serif;
        font-size: clamp(18px, 4vw, 28px);
        padding: 0 30px 0 180px;
        outline: none;
        transition: all 0.3s ease;
        color: #333;
    }

    .input-field:focus {
        border-color: #e85b4e;
        box-shadow: 0 0 0 3px rgba(255, 111, 97, 0.2);
    }

    /* Когда поле заполнено или в фокусе - поднимаем label */
    .input-field:focus ~ .input-label,
    .input-field:not(:placeholder-shown) ~ .input-label {
        top: 0;
        transform: translateY(-50%);
        font-size: clamp(16px, 3vw, 24px);
        background: white;
        padding: 0 10px;
        left: 30px;
        color: #FF6F61;
    }

    /* Плейсхолдер прозрачный, чтобы работал :placeholder-shown */
    .input-field::placeholder {
        color: transparent;
    }

    /* Кнопка входа (Rectangle 7) */
    .login-btn {
        width: 100%;
        max-width: 397px;
        height: 92px;
        background: #FF8E83;
        border-radius: 46px;
        border: none;
        font-family: 'Gilroy', sans-serif;
        font-weight: 500;
        font-size: clamp(28px, 6vw, 48px);
        line-height: 1.2;
        color: #000000;
        cursor: pointer;
        display: block;
        margin: 0 auto;
        transition: all 0.3s ease;
        text-align: center;
    }

    .login-btn:hover {
        background: #e85b4e;
        transform: scale(1.02);
        box-shadow: 0 5px 20px rgba(255, 111, 97, 0.3);
    }

    /* Ссылка на регистрацию */
    .register-link {
        text-align: center;
        margin-top: 40px;
    }

    .register-link a {
        font-family: 'Gilroy', sans-serif;
        font-size: clamp(16px, 4vw, 20px);
        color: #FF6F61;
        text-decoration: none;
    }

    .register-link a:hover {
        text-decoration: underline;
    }

    /* Адаптация для разных экранов */
    @media (max-width: 768px) {
        .login-container {
            padding: 0 20px;
        }

        .login-title {
            padding: 25px 20px;
        }

        .input-field {
            height: 75px;
            padding: 0 20px 0 140px;
        }

        .input-label {
            left: 30px;
            font-size: 24px;
        }

        .input-field:focus ~ .input-label,
        .input-field:not(:placeholder-shown) ~ .input-label {
            font-size: 18px;
            left: 20px;
        }

        .input-group-custom {
            margin-bottom: 60px;
        }

        .login-btn {
            height: 75px;
            max-width: 320px;
        }
    }

    @media (max-width: 640px) {
        .input-field {
            height: 65px;
            padding: 0 15px 0 100px;
        }

        .input-label {
            left: 20px;
            font-size: 20px;
        }

        .input-field:focus ~ .input-label,
        .input-field:not(:placeholder-shown) ~ .input-label {
            font-size: 14px;
            left: 15px;
        }

        .input-group-custom {
            margin-bottom: 50px;
        }

        .login-btn {
            height: 65px;
            max-width: 280px;
        }
    }

    @media (max-width: 480px) {
        .input-field {
            height: 55px;
            padding: 0 12px 0 80px;
            font-size: 16px;
        }

        .input-label {
            left: 15px;
            font-size: 16px;
        }

        .input-field:focus ~ .input-label,
        .input-field:not(:placeholder-shown) ~ .input-label {
            font-size: 12px;
            left: 12px;
        }

        .login-title {
            padding: 18px 15px;
            font-size: 24px;
        }

        .login-btn {
            height: 55px;
            font-size: 28px;
            max-width: 240px;
        }
    }

    /* Для очень маленьких экранов */
    @media (max-width: 380px) {
        .input-field {
            padding: 0 10px 0 70px;
        }

        .input-label {
            font-size: 14px;
            left: 12px;
        }
    }
</style>

<div class="login-page">
    <div class="login-container">
        <!-- Заголовок -->
        <div class="login-header">
            <img src="{{ url_for('static', filename='login.png') }}" alt="Login" onerror="this.src='https://via.placeholder.com/76'">
        </div>

        <!-- Форма входа -->
        <form method="POST" class="login-form">
            <div class="input-group-custom">
                <input type="email"
                       name="email"
                       id="email"
                       class="input-field"
                       placeholder=" "
                       required>
                <label for="email" class="input-label">email</label>
            </div>

            <div class="input-group-custom">
                <input type="password"
                       name="password"
                       id="password"
                       class="input-field"
                       placeholder=" "
                       required>
                <label for="password" class="input-label">пароль</label>
            </div>

            <button type="submit" class="login-btn">войти</button>
        </form>

        <!-- Ссылка на регистрацию -->
        <div class="register-link">
            <a href="{{ url_for('choose_role') }}">Нет аккаунта? Зарегистрироваться</a>
        </div>
    </div>
</div>
{% endblock %}
